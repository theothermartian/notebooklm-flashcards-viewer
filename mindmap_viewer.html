<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotebookLM Mind Map Viewer</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        /* Tokyo Night Dark Theme Palette */
        :root {
            --bg-color: #1a1b26;
            --surface-color: #24283b;
            --surface-highlight: #292e42;
            --text-primary: #c0caf5;
            --text-secondary: #a9b1d6;
            --text-muted: #565f89;
            --accent-primary: #7aa2f7;
            --accent-secondary: #bb9af7;
            --accent-success: #9ece6a;
            --accent-error: #f7768e;
            --accent-warning: #e0af68;
            --accent-info: #7dcfff;
            --accent-terminal: #414868;
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap');

        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-primary);
            margin: 0; 
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Glassmorphism Header */
        header {
            padding: 1rem 2.5rem;
            background: rgba(36, 40, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 100;
            position: sticky;
            top: 0;
        }

        h1 { 
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.5rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.5px;
            filter: drop-shadow(0 0 10px rgba(122, 162, 247, 0.3));
        }

        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .btn {
            border: 1px solid rgba(122, 162, 247, 0.5);
            color: var(--accent-primary);
            background: rgba(122, 162, 247, 0.1);
            padding: 0.6rem 1.5rem;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover {
            background: var(--accent-primary);
            color: var(--bg-color);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(122, 162, 247, 0.4);
        }

        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        main {
            flex-grow: 1;
            position: relative;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 2px 2px, rgba(255, 255, 255, 0.03) 1px, transparent 0);
            background-size: 40px 40px;
        }

        #mindmap {
            width: 100%;
            height: 100%;
        }

        /* SVG Styles */
        .node circle {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .node text {
            font-family: 'JetBrainsMono Nerd Font', 'JetBrains Mono', monospace;
            font-size: 13px;
            fill: var(--text-secondary);
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .node:hover text {
            fill: var(--text-primary);
            font-weight: 600;
            font-size: 14px;
        }

        .link {
            fill: none;
            stroke: var(--accent-terminal);
            stroke-opacity: 0.6;
            stroke-width: 2px;
            transition: all 0.3s ease;
        }

        .link-active {
            stroke: var(--accent-primary);
            stroke-opacity: 1;
            stroke-width: 3px;
            filter: drop-shadow(0 0 5px var(--accent-primary));
        }

        /* Controls styling */
        .controls {
            position: absolute;
            bottom: 2.5rem;
            right: 2.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            background: rgba(36, 40, 59, 0.8);
            padding: 0.75rem;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .control-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: var(--surface-highlight);
            color: var(--text-primary);
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.4rem;
            transition: all 0.2s;
        }

        .control-btn:hover {
            background: var(--accent-primary);
            color: var(--bg-color);
            transform: scale(1.1);
        }

        .placeholder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: var(--surface-color);
            padding: 4rem;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .placeholder p {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
            max-width: 300px;
            line-height: 1.5;
        }

        /* Glowing Tooltip */
        .tooltip {
            position: absolute;
            padding: 12px 16px;
            background: rgba(26, 27, 38, 0.95);
            color: var(--text-primary);
            border: 1px solid var(--accent-primary);
            border-radius: 12px;
            pointer-events: none;
            font-size: 0.9rem;
            opacity: 0;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6), 0 0 15px rgba(122, 162, 247, 0.2);
            backdrop-filter: blur(5px);
        }

        .tooltip strong { color: var(--accent-info); }

    </style>
</head>
<body>
    <header>
        <h1>Database Masterclass Explorer</h1>
        <div class="upload-btn-wrapper">
            <button class="btn"><span>📂</span> Upload JSON</button>
            <input type="file" id="fileInput" accept=".json">
        </div>
    </header>

    <main id="container">
        <div id="placeholder" class="placeholder">
            <p>Ready to visualize your database architecture? Select a NotebookLM JSON.</p>
            <div class="upload-btn-wrapper">
                <button class="btn" style="padding: 1rem 2rem; font-size: 1.1rem;"><span>🚀</span> Open Mind Map</button>
                <input type="file" id="fileInputPlaceholder" accept=".json">
            </div>
        </div>
        <svg id="mindmap"></svg>
        <div id="tooltip" class="tooltip"></div>
        <div class="controls" id="zoomControls" style="display: none;">
            <button class="control-btn" onclick="zoomIn()" title="Zoom In">+</button>
            <button class="control-btn" onclick="zoomOut()" title="Zoom Out">−</button>
            <button class="control-btn" onclick="resetZoom()" title="Reset View">⟲</button>
        </div>
    </main>

    <script>
        const svg = d3.select("#mindmap");
        const tooltip = d3.select("#tooltip");
        const placeholder = document.getElementById('placeholder');
        const zoomControls = document.getElementById('zoomControls');
        
        let width = window.innerWidth;
        let height = window.innerHeight - 80;
        let root_data;
        let g;

        const zoom = d3.zoom()
            .scaleExtent([0.05, 5])
            .on("zoom", (event) => {
                if (g) g.attr("transform", event.transform);
            });

        svg.call(zoom);

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    renderMindMap(data);
                    placeholder.style.display = 'none';
                    zoomControls.style.display = 'flex';
                } catch (err) {
                    alert("Error parsing JSON file: " + err.message);
                }
            };
            reader.readAsText(file);
        }

        document.getElementById('fileInput').addEventListener('change', handleFileSelect);
        document.getElementById('fileInputPlaceholder').addEventListener('change', handleFileSelect);

        window.addEventListener('resize', () => {
            width = window.innerWidth;
            height = window.innerHeight - 80;
            svg.attr("width", width).attr("height", height);
        });

        function renderMindMap(data) {
            svg.selectAll("*").remove();
            
            const defs = svg.append("defs");
            g = svg.append("g");

            // Use radial tree layout
            const radius = Math.min(width, height) / 2 - 140;
            const treeLayout = d3.tree()
                .size([2 * Math.PI, radius])
                .separation((a, b) => (a.parent == b.parent ? 1 : 2) / a.depth);

            root_data = d3.hierarchy(data);
            treeLayout(root_data);

            // Glowing line filter
            const filter = defs.append("filter")
                .attr("id", "glow");
            filter.append("feGaussianBlur")
                .attr("stdDeviation", "2.5")
                .attr("result", "coloredBlur");
            const feMerge = filter.append("feMerge");
            feMerge.append("feMergeNode").attr("in", "coloredBlur");
            feMerge.append("feMergeNode").attr("in", "SourceGraphic");

            // Links with radial paths
            const linkGenerator = d3.linkRadial()
                .angle(d => d.x)
                .radius(d => d.y);

            const link = g.selectAll(".link")
                .data(root_data.links())
                .enter()
                .append("path")
                .attr("class", "link")
                .attr("d", linkGenerator);

            // Nodes
            const node = g.selectAll(".node")
                .data(root_data.descendants())
                .enter()
                .append("g")
                .attr("class", "node")
                .attr("transform", d => `
                    rotate(${d.x * 180 / Math.PI - 90})
                    translate(${d.y},0)
                `);

            // Background glow for primary nodes
            node.filter(d => d.depth < 2)
                .append("circle")
                .attr("r", d => d.depth === 0 ? 20 : 12)
                .style("fill", d => d.depth === 0 ? "var(--accent-secondary)" : "var(--accent-primary)")
                .style("opacity", 0.15)
                .style("filter", "blur(8px)");

            node.append("circle")
                .attr("r", d => {
                    if (d.depth === 0) return 10;
                    if (d.depth === 1) return 7;
                    return 5;
                })
                .style("fill", d => {
                    if (d.depth === 0) return "var(--accent-secondary)";
                    if (d.depth === 1) return "var(--accent-primary)";
                    if (d.depth === 2) return "var(--accent-success)";
                    return "var(--surface-highlight)";
                })
                .style("stroke", d => {
                    if (d.depth === 0) return "var(--accent-secondary)";
                    if (d.depth === 1) return "var(--accent-primary)";
                    if (d.depth === 2) return "var(--accent-success)";
                    return "var(--text-muted)";
                })
                .style("stroke-width", "2px")
                .on("mouseover", (event, d) => {
                    // Highlight paths
                    link.filter(l => l.target === d || l.source === d)
                        .classed("link-active", true);

                    tooltip.transition().duration(200).style("opacity", 1);
                    tooltip.html(`<strong>${d.data.name}</strong>${d.children ? `<br><span style="color:var(--text-muted)">${d.children.length} sub-topics</span>` : ""}`)
                        .style("left", (event.pageX + 15) + "px")
                        .style("top", (event.pageY - 15) + "px");
                    
                    d3.select(event.currentTarget)
                        .transition().duration(200)
                        .attr("r", d.depth === 0 ? 14 : 11)
                        .style("filter", "url(#glow)");
                })
                .on("mouseout", (event, d) => {
                    link.classed("link-active", false);
                    tooltip.transition().duration(500).style("opacity", 0);
                    d3.select(event.currentTarget)
                        .transition().duration(200)
                        .attr("r", d.depth === 0 ? 10 : (d.depth === 1 ? 7 : 5))
                        .style("filter", "none");
                });

            node.append("text")
                .attr("dy", "0.35em")
                .attr("x", d => d.x < Math.PI === !d.children ? 12 : -12)
                .attr("text-anchor", d => d.x < Math.PI === !d.children ? "start" : "end")
                .attr("transform", d => d.x >= Math.PI ? "rotate(180)" : null)
                .text(d => d.data.name)
                .style("font-weight", d => d.depth < 2 ? "700" : "400")
                .clone(true).lower()
                .attr("stroke", "var(--bg-color)")
                .attr("stroke-width", 4)
                .style("opacity", 0.8);

            resetZoom();
        }

        function zoomIn() {
            svg.transition().duration(300).call(zoom.scaleBy, 1.5);
        }

        function zoomOut() {
            svg.transition().duration(300).call(zoom.scaleBy, 0.6);
        }

        function resetZoom() {
            if (!g) return;
            svg.transition().duration(1000).call(
                zoom.transform,
                d3.zoomIdentity
                    .translate(width / 2, height / 2)
                    .scale(1)
            );
        }
    </script>
</body>
</html>
