<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotebookLM Flashcard Viewer</title>
    <style>
        /* Tokyo Night Dark Theme Palette */
        :root {
            --bg-color: #1a1b26;
            --surface-color: #24283b;
            --surface-highlight: #292e42;
            --text-primary: #c0caf5;
            --text-secondary: #a9b1d6;
            --text-muted: #565f89;
            --accent-primary: #7aa2f7;
            --accent-secondary: #bb9af7;
            --accent-success: #9ece6a;
            --accent-error: #f7768e;
            --accent-warning: #e0af68;
            --accent-info: #7dcfff;
        }

        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-primary);
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 2rem; 
            margin: 0; 
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container { 
            max-width: 650px; 
            width: 100%; 
            text-align: center; 
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        h1 { 
            color: var(--accent-primary); 
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
        }

        .upload-area { 
            margin-top: 2rem;
            padding: 4rem 2rem; 
            border: 2px dashed var(--text-muted); 
            border-radius: 16px; 
            background: var(--surface-color); 
            transition: all 0.3s ease;
        }

        .upload-area:hover {
            border-color: var(--accent-primary);
            background: var(--surface-highlight);
        }

        .upload-area p {
            font-size: 1.1rem; 
            color: var(--text-secondary); 
            margin-bottom: 2rem;
        }

        .flashcard-container { 
            perspective: 1200px; 
            margin: 1rem auto; 
            width: 100%; 
            height: 400px; 
            display: none; 
            cursor: pointer; 
        }

        .flashcard { 
            width: 100%; 
            height: 100%; 
            position: relative; 
            transition: transform 0.7s cubic-bezier(0.4, 0.2, 0.2, 1); 
            transform-style: preserve-3d; 
            border-radius: 20px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.05); 
        }

        .flashcard.is-flipped { 
            transform: rotateY(180deg); 
        }

        .flashcard-face { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            backface-visibility: hidden; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 3rem; 
            box-sizing: border-box; 
            border-radius: 20px; 
            font-size: 1.35rem; 
            line-height: 1.6; 
            overflow-y: auto; 
            background: var(--surface-color);
            color: var(--text-primary);
        }

        /* Styling Markdown Elements inside Cards */
        .flashcard-face strong { color: var(--accent-info); font-weight: 600; }
        .flashcard-face em { color: var(--accent-secondary); font-style: italic; }
        .flashcard-face code { 
            background: var(--bg-color); 
            color: var(--accent-warning);
            padding: 0.2rem 0.5rem; 
            border-radius: 6px; 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 0.9em;
            border: 1px solid var(--surface-highlight);
        }

        .flashcard-back { 
            background: linear-gradient(145deg, var(--surface-highlight), var(--surface-color)); 
            transform: rotateY(180deg); 
            border: 1px solid rgba(122, 162, 247, 0.2);
        }

        .label { 
            position: absolute; 
            top: 1.2rem; 
            left: 1.5rem; 
            font-size: 0.85rem; 
            font-weight: 700; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
        }
        
        .flashcard-front .label { color: var(--accent-primary); }
        .flashcard-back .label { color: var(--accent-secondary); }

        .controls { 
            display: none; 
            gap: 1rem; 
            justify-content: center; 
            margin-top: 1rem; 
        }

        button { 
            padding: 0.8rem 1.8rem; 
            border: none; 
            border-radius: 10px; 
            background: var(--accent-primary); 
            color: var(--bg-color); 
            cursor: pointer; 
            font-size: 1rem; 
            font-weight: 600; 
            transition: all 0.2s ease; 
            box-shadow: 0 4px 12px rgba(122, 162, 247, 0.25);
        }

        button:hover { 
            background: var(--accent-info); 
            transform: translateY(-2px); 
            box-shadow: 0 6px 16px rgba(125, 207, 255, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled { 
            background: var(--surface-highlight); 
            color: var(--text-muted);
            cursor: not-allowed; 
            transform: none; 
            box-shadow: none;
        }

        .secondary-btn { 
            background: var(--surface-highlight); 
            color: var(--text-primary);
            box-shadow: none;
        }

        .secondary-btn:hover { 
            background: var(--text-muted); 
            color: var(--bg-color);
        }

        .progress { 
            font-size: 1rem; 
            color: var(--text-secondary); 
            font-weight: 500; 
            display: none; 
            letter-spacing: 0.5px;
            background: var(--surface-color);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            align-self: center;
            border: 1px solid var(--surface-highlight);
        }

        #fileInput { display: none; }
        
        .file-label { 
            display: inline-block; 
            padding: 1rem 2.5rem; 
            background: var(--accent-primary); 
            color: var(--bg-color); 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 1.1rem; 
            font-weight: 600; 
            transition: all 0.2s ease; 
            box-shadow: 0 4px 15px rgba(122, 162, 247, 0.25);
        }

        .file-label:hover { 
            background: var(--accent-info); 
            transform: translateY(-2px);
        }

        .instructions { 
            font-size: 0.9rem; 
            color: var(--text-muted); 
            margin-top: 2rem; 
        }
        
        .instructions strong {
            color: var(--text-secondary);
        }

        /* Custom Scrollbar for long card content */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

    </style>
</head>
<body>
    <div class="container">
        <h1>NotebookLM Flashcards</h1>
        
        <div class="upload-area" id="uploadArea">
            <p>Upload a Markdown (.md) flashcard file generated by NotebookLM.</p>
            <label class="file-label" for="fileInput">Choose Markdown File</label>
            <input type="file" id="fileInput" accept=".md,.txt">
        </div>

        <div class="progress" id="progress">Card 1 of X</div>

        <div class="flashcard-container" id="cardContainer">
            <div class="flashcard" id="flashcard">
                <div class="flashcard-face flashcard-front">
                    <div class="label">Front</div>
                    <div id="cardFront"></div>
                </div>
                <div class="flashcard-face flashcard-back">
                    <div class="label">Back</div>
                    <div id="cardBack"></div>
                </div>
            </div>
        </div>

        <div class="controls" id="controls">
            <button class="secondary-btn" id="prevBtn">Previous</button>
            <button class="secondary-btn" id="shuffleBtn">Shuffle</button>
            <button id="nextBtn">Next</button>
        </div>
        <p class="instructions" id="instructions" style="display: none;">Use <strong>Spacebar</strong> to flip and <strong>Arrows</strong> to navigate.</p>
    </div>

    <script>
        let cards = [];
        let currentIndex = 0;

        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('uploadArea');
        const cardContainer = document.getElementById('cardContainer');
        const flashcard = document.getElementById('flashcard');
        const cardFront = document.getElementById('cardFront');
        const cardBack = document.getElementById('cardBack');
        const controls = document.getElementById('controls');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const shuffleBtn = document.getElementById('shuffleBtn');
        const progress = document.getElementById('progress');
        const instructions = document.getElementById('instructions');

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                parseMarkdown(event.target.result);
            };
            reader.readAsText(file);
        });

        function parseMarkdown(text) {
            cards = [];
            const sections = text.split('---');
            
            for (const section of sections) {
                const frontMatch = section.match(/\*\*Front:\*\*\s*([\s\S]*?)(?=\*\*Back:\*\*|$)/);
                const backMatch = section.match(/\*\*Back:\*\*\s*([\s\S]*?)(?=$)/);
                
                if (frontMatch && backMatch) {
                    cards.push({
                        front: parseSimpleMarkdown(frontMatch[1].trim()),
                        back: parseSimpleMarkdown(backMatch[1].trim())
                    });
                }
            }

            if (cards.length > 0) {
                currentIndex = 0;
                uploadArea.style.display = 'none';
                cardContainer.style.display = 'block';
                controls.style.display = 'flex';
                progress.style.display = 'inline-block';
                instructions.style.display = 'block';
                displayCard();
            } else {
                alert('No flashcards found. Ensure the file contains **Front:** and **Back:** markers separated by ---.');
            }
        }

        function parseSimpleMarkdown(text) {
            return text
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/\n/g, '<br>')
                .replace(/\*\*([^\*]+)\*\*/g, '<strong>$1</strong>')
                .replace(/\*([^\*]+)\*/g, '<em>$1</em>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\$([^\$]+)\$/g, '<code>$1</code>');
        }

        function displayCard() {
            if (cards.length === 0) return;
            flashcard.classList.remove('is-flipped');
            
            setTimeout(() => {
                cardFront.innerHTML = cards[currentIndex].front;
                cardBack.innerHTML = cards[currentIndex].back;
                updateUI();
            }, 150);
        }

        function updateUI() {
            progress.textContent = `Card ${currentIndex + 1} of ${cards.length}`;
            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = currentIndex === cards.length - 1;
        }

        flashcard.addEventListener('click', () => {
            flashcard.classList.toggle('is-flipped');
        });

        prevBtn.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                displayCard();
            }
        });

        nextBtn.addEventListener('click', () => {
            if (currentIndex < cards.length - 1) {
                currentIndex++;
                displayCard();
            }
        });

        shuffleBtn.addEventListener('click', () => {
            for (let i = cards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cards[i], cards[j]] = [cards[j], cards[i]];
            }
            currentIndex = 0;
            displayCard();
        });
        
        document.addEventListener('keydown', (e) => {
            if (cards.length === 0) return;
            if (e.code === 'Space') {
                e.preventDefault();
                flashcard.classList.toggle('is-flipped');
            } else if (e.code === 'ArrowRight' && currentIndex < cards.length - 1) {
                currentIndex++;
                displayCard();
            } else if (e.code === 'ArrowLeft' && currentIndex > 0) {
                currentIndex--;
                displayCard();
            }
        });
    </script>
</body>
</html>
