<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotebookLM Flashcard Viewer</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #f4f4f9; display: flex; flex-direction: column; align-items: center; padding: 2rem; margin: 0; }
        .container { max-width: 600px; width: 100%; text-align: center; }
        h1 { color: #333; }
        .upload-area { margin-bottom: 2rem; padding: 3rem; border: 2px dashed #bbb; border-radius: 12px; background: white; }
        .flashcard-container { perspective: 1000px; margin: 2rem auto; width: 100%; height: 350px; display: none; cursor: pointer; }
        .flashcard { width: 100%; height: 100%; position: relative; transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); transform-style: preserve-3d; border-radius: 16px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .flashcard.is-flipped { transform: rotateY(180deg); }
        .flashcard-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; box-sizing: border-box; border-radius: 16px; background: white; font-size: 1.4rem; line-height: 1.6; overflow-y: auto; color: #222; }
        .flashcard-back { background: #eef2ff; transform: rotateY(180deg); }
        .label { position: absolute; top: 1rem; left: 1rem; font-size: 0.9rem; font-weight: bold; color: #777; text-transform: uppercase; letter-spacing: 1px; }
        .controls { display: none; gap: 1rem; justify-content: center; margin-top: 2rem; }
        button { padding: 0.75rem 1.5rem; border: none; border-radius: 8px; background: #0052cc; color: white; cursor: pointer; font-size: 1rem; font-weight: bold; transition: background 0.2s, transform 0.1s; }
        button:hover { background: #003d99; transform: translateY(-2px); }
        button:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        .secondary-btn { background: #555; }
        .secondary-btn:hover { background: #333; }
        .progress { margin-top: 1rem; font-size: 1.1rem; color: #555; font-weight: bold; display: none; }
        #fileInput { display: none; }
        .file-label { display: inline-block; padding: 1rem 2rem; background: #0052cc; color: white; border-radius: 8px; cursor: pointer; font-size: 1.1rem; font-weight: bold; transition: background 0.2s; }
        .file-label:hover { background: #003d99; }
        .instructions { font-size: 0.9rem; color: #666; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>NotebookLM Flashcards</h1>
        
        <div class="upload-area" id="uploadArea">
            <p style="font-size: 1.2rem; color: #555; margin-bottom: 2rem;">Upload a Markdown (.md) flashcard file generated by NotebookLM.</p>
            <label class="file-label" for="fileInput">Choose Markdown File</label>
            <input type="file" id="fileInput" accept=".md,.txt">
        </div>

        <div class="progress" id="progress">Card 1 of X</div>

        <div class="flashcard-container" id="cardContainer">
            <div class="flashcard" id="flashcard">
                <div class="flashcard-face flashcard-front">
                    <div class="label">Front</div>
                    <div id="cardFront"></div>
                </div>
                <div class="flashcard-face flashcard-back">
                    <div class="label">Back</div>
                    <div id="cardBack"></div>
                </div>
            </div>
        </div>

        <div class="controls" id="controls">
            <button class="secondary-btn" id="prevBtn">Previous</button>
            <button class="secondary-btn" id="shuffleBtn">Shuffle</button>
            <button id="nextBtn">Next</button>
        </div>
        <p class="instructions" id="instructions" style="display: none;">Use <strong>Spacebar</strong> to flip and <strong>Arrows</strong> to navigate.</p>
    </div>

    <script>
        let cards = [];
        let currentIndex = 0;

        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('uploadArea');
        const cardContainer = document.getElementById('cardContainer');
        const flashcard = document.getElementById('flashcard');
        const cardFront = document.getElementById('cardFront');
        const cardBack = document.getElementById('cardBack');
        const controls = document.getElementById('controls');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const shuffleBtn = document.getElementById('shuffleBtn');
        const progress = document.getElementById('progress');
        const instructions = document.getElementById('instructions');

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                parseMarkdown(event.target.result);
            };
            reader.readAsText(file);
        });

        function parseMarkdown(text) {
            cards = [];
            // NotebookLM often separates cards by '---'
            const sections = text.split('---');
            
            for (const section of sections) {
                const frontMatch = section.match(/\*\*Front:\*\*\s*([\s\S]*?)(?=\*\*Back:\*\*|$)/);
                const backMatch = section.match(/\*\*Back:\*\*\s*([\s\S]*?)(?=$)/);
                
                if (frontMatch && backMatch) {
                    cards.push({
                        front: parseSimpleMarkdown(frontMatch[1].trim()),
                        back: parseSimpleMarkdown(backMatch[1].trim())
                    });
                }
            }

            if (cards.length > 0) {
                currentIndex = 0;
                uploadArea.style.display = 'none';
                cardContainer.style.display = 'block';
                controls.style.display = 'flex';
                progress.style.display = 'block';
                instructions.style.display = 'block';
                displayCard();
            } else {
                alert('No flashcards found. Ensure the file contains **Front:** and **Back:** markers separated by ---.');
            }
        }

        function parseSimpleMarkdown(text) {
            // Very basic parser to handle bold, italics, code, and line breaks
            return text
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/\n/g, '<br>')
                .replace(/\*\*([^\*]+)\*\*/g, '<strong>$1</strong>')
                .replace(/\*([^\*]+)\*/g, '<em>$1</em>')
                .replace(/`([^`]+)`/g, '<code style="background:#eee;padding:0.2rem 0.4rem;border-radius:4px;font-family:monospace;">$1</code>')
                .replace(/\$([^\$]+)\$/g, '<code style="background:#f4f4f4;padding:0.2rem 0.4rem;border-radius:4px;font-family:monospace;">$1</code>');
        }

        function displayCard() {
            if (cards.length === 0) return;
            flashcard.classList.remove('is-flipped');
            
            // Allow animation to finish before replacing text
            setTimeout(() => {
                cardFront.innerHTML = cards[currentIndex].front;
                cardBack.innerHTML = cards[currentIndex].back;
                updateUI();
            }, 150); // Small delay to hide the transition
        }

        function updateUI() {
            progress.textContent = `Card ${currentIndex + 1} of ${cards.length}`;
            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = currentIndex === cards.length - 1;
        }

        flashcard.addEventListener('click', () => {
            flashcard.classList.toggle('is-flipped');
        });

        prevBtn.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                displayCard();
            }
        });

        nextBtn.addEventListener('click', () => {
            if (currentIndex < cards.length - 1) {
                currentIndex++;
                displayCard();
            }
        });

        shuffleBtn.addEventListener('click', () => {
            for (let i = cards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cards[i], cards[j]] = [cards[j], cards[i]];
            }
            currentIndex = 0;
            displayCard();
        });
        
        document.addEventListener('keydown', (e) => {
            if (cards.length === 0) return;
            if (e.code === 'Space') {
                e.preventDefault();
                flashcard.classList.toggle('is-flipped');
            } else if (e.code === 'ArrowRight' && currentIndex < cards.length - 1) {
                currentIndex++;
                displayCard();
            } else if (e.code === 'ArrowLeft' && currentIndex > 0) {
                currentIndex--;
                displayCard();
            }
        });
    </script>
</body>
</html>
